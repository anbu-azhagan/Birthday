## 📱 App Features

| Feature | Details |
|---------|---------|
| **Storage** | IndexedDB (never cleared by cache/history clear) |
| **Notifications** | Native Android AlarmManager – works even when app is closed |
| **Contacts** | Supports 2500+ contacts with fast alphabetical search |
| **Reminders** | Configurable: On day, 1 day, 3 days, 1 week, 2 weeks before |
| **Import** | Bulk import from CSV file |
| **Export** | Export all contacts to CSV |
| **Backup** | Export CSV and keep it safe |

---

## 🔔 How Notifications Work

The app uses **Android's AlarmManager** which:
- Fires notifications even when the app is CLOSED
- Survives phone restarts (BOOT_COMPLETED receiver)
- Is NOT affected by battery optimization (uses exact alarms)
- Shows notification at 9:00 AM on the reminder day

