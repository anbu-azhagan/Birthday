## 🛠 Troubleshooting

**"Install blocked"** → Go to Settings → Security → Enable "Unknown Sources"

**Notifications not showing** → 
- Settings → Apps → Celebrations → Notifications → Enable All
- Settings → Battery → Celebrations → Don't optimize

**Gradle sync fails** → 
- File → Invalidate Caches and Restart
- Check internet connection (Gradle needs to download dependencies)

